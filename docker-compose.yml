version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:80"
    environment:
      APP_NAME: "BOCRA System"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ""
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: bocra_db
      DB_USERNAME: bocra_user
      DB_PASSWORD: bocra_pass
      SESSION_DRIVER: cookie
      QUEUE_CONNECTION: sync
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/www/html

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: bocra_db
      MYSQL_USER: bocra_user
      MYSQL_PASSWORD: bocra_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - bocra_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "--password=root_pass"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  bocra_db_data:
