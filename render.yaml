services:
  - type: web
    name: bocra-api
    runtime: php
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan key:generate
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=10000
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://bocra-api.onrender.com
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file
      - key: DB_HOST
        fromDatabase:
          name: bocra-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: bocra-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: bocra-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: bocra-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: bocra-db
          property: password
      - key: RENDER_EXTERNAL_URL
        value: https://bocra-api.onrender.com

  - type: database
    name: bocra-db
    plan: free
    databaseName: bocra_db
    user: bocra_user